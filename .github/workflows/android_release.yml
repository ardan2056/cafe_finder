name: Build & Release Android APK

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "stable"

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload Proguard mapping to Crashlytics (optional)
        if: always()
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          ANDROID_APP_ID: ${{ secrets.ANDROID_APP_ID }}
        run: |
          if [ -n "$FIREBASE_TOKEN" ] && [ -f "android/app/build/outputs/mapping/release/mapping.txt" ]; then
            echo "Uploading mapping file to Crashlytics..."
            npm install -g firebase-tools || true
            firebase crashlytics:upload-mappings --app "$ANDROID_APP_ID" android/app/build/outputs/mapping/release/mapping.txt || true
          else
            echo "Skipping mapping upload (no FIREBASE_TOKEN or mapping file)."
          fi

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/app/outputs/flutter-apk/app-release.apk
          asset_name: app-release.apk
          asset_content_type: application/vnd.android.package-archive

name: Format Check

on:
  pull_request:
    paths:
      - '**/*.dart'

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
      - name: Run flutter format check
        run: |
          flutter format --set-exit-if-changed .
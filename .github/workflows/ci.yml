name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
      - name: Flutter pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Run tests
        run: flutter test --coverage
      - name: Build web
        if: matrix.os == 'ubuntu-latest'
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          MAP_TILE_URL_TEMPLATE: ${{ secrets.MAP_TILE_URL_TEMPLATE }}
          MAP_TILE_API_KEY: ${{ secrets.MAP_TILE_API_KEY }}
          MAP_TILE_FALLBACK_URL_TEMPLATE: ${{ secrets.MAP_TILE_FALLBACK_URL_TEMPLATE }}
        run: |
          flutter build web \
            --dart-define=SENTRY_DSN="$SENTRY_DSN" \
            --dart-define=MAP_TILE_URL_TEMPLATE="${MAP_TILE_URL_TEMPLATE:-https://tile.openstreetmap.org/{z}/{x}/{y}.png}" \
            --dart-define=MAP_TILE_API_KEY="$MAP_TILE_API_KEY" \
            --dart-define=MAP_TILE_FALLBACK_URL_TEMPLATE="${MAP_TILE_FALLBACK_URL_TEMPLATE:-https://tile.openstreetmap.org/{z}/{x}/{y}.png}"
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: coverage

name: cafe_finder
description: Cafe Finder Flutter app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  url_launcher: ^6.2.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^8.2.2
  sentry_flutter: ^7.17.0
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  shared_preferences: ^2.3.2
  shimmer: ^2.0.0
  image_picker: ^1.2.2
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
